<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        position: relative;
        background: #0a0a0b;
        background-image:
          radial-gradient(120% 80% at 88% -20%, rgba(232, 163, 61, 0.12), transparent 55%),
          radial-gradient(90% 70% at -10% 120%, rgba(232, 163, 61, 0.06), transparent 60%);
        color: #f4f1ea;
        font-family: "Manrope", sans-serif;
        overflow: hidden;
      }
      /* oversized watermark */
      .watermark {
        position: absolute;
        right: -60px;
        bottom: -160px;
        font-family: "Fraunces", serif;
        font-weight: 300;
        font-size: 520px;
        line-height: 0.7;
        color: #f4f1ea;
        opacity: 0.035;
        user-select: none;
      }
      .frame {
        position: absolute;
        inset: 44px;
        border: 1px solid #26262b;
      }
      .content {
        position: absolute;
        inset: 0;
        padding: 96px 104px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .mark {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 34px;
        color: #e8a33d;
        letter-spacing: 0.02em;
      }
      .eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #76746e;
      }
      .name {
        font-family: "Fraunces", serif;
        font-weight: 300;
        font-size: 148px;
        line-height: 0.84;
        letter-spacing: -0.035em;
        color: #f4f1ea;
      }
      .name .surname {
        display: block;
        font-style: italic;
        font-weight: 400;
        color: #e8a33d;
        padding-left: 80px;
      }
      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .role {
        font-size: 30px;
        font-weight: 600;
        color: #f4f1ea;
      }
      .tagline {
        font-family: "JetBrains Mono", monospace;
        font-size: 17px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #b8b5ad;
        margin-top: 10px;
      }
      .meta {
        text-align: right;
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        letter-spacing: 0.08em;
        color: #76746e;
        line-height: 1.9;
      }
      .meta strong { color: #f4f1ea; font-weight: 500; }
    </style>
  </head>
  <body>
    <div class="watermark">FE</div>
    <div class="frame"></div>
    <div class="content">
      <div class="top">
        <span class="mark">NV</span>
        <span class="eyebrow">Portfolio</span>
      </div>

      <h1 class="name">
        Nikša
        <span class="surname">Volarević</span>
      </h1>

      <div class="bottom">
        <div>
          <div class="role">Senior Frontend Engineer</div>
          <div class="tagline">React · Next.js · TypeScript</div>
        </div>
        <div class="meta">
          <div><strong>12+ years</strong></div>
          <div>Belgrade — remote EU / US</div>
        </div>
      </div>
    </div>
  </body>
</html>
